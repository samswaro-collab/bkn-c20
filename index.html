<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAKON</title>
<style>
/* Wrapper styles scoped to #beakon-gate so they vanish after document.write replaces the body */
#beakon-gate{position:fixed;inset:0;background:#060f1e;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;z-index:999999;}
#beakon-gate *{margin:0;padding:0;box-sizing:border-box;}
#beakon-gate #al{text-align:center;color:#fff;}
#beakon-gate .sp{width:40px;height:40px;border:3px solid rgba(0,212,200,0.2);
    border-top-color:#00d4c8;border-radius:50%;
    animation:bksp .8s linear infinite;margin:0 auto 16px;}
@keyframes bksp{to{transform:rotate(360deg)}}
#beakon-gate .lt{font-size:11px;color:#00a6a0;letter-spacing:1.5px;text-transform:uppercase;}
#beakon-gate #ul{display:none;flex-direction:column;align-items:center;gap:14px;
    max-width:340px;width:100%;padding:0 24px;}
#beakon-gate .bn{font-size:22px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:4px;}
#beakon-gate .bt{font-size:9px;color:#f59e0b;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
#beakon-gate .ui{width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,212,200,0.3);border-radius:8px;color:#fff;
    font-size:13px;font-family:inherit;}
#beakon-gate .ui:focus{outline:none;border-color:#00d4c8;}
#beakon-gate .ub{width:100%;padding:12px;background:linear-gradient(135deg,#00d4c8,#007a75);
    border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;
    cursor:pointer;letter-spacing:.5px;}
#beakon-gate .ub:hover{opacity:.9;}
#beakon-gate .ue{font-size:11px;color:#f87171;display:none;text-align:center;}
</style>
</head>
<body>
<div id="beakon-gate">
<div id="al"><div class="sp"></div><div class="lt">Loading Intelligence...</div></div>
<div id="ul">
  <div>
    <div class="bn">BEAKON</div>
    <div class="bt">Signal to Signed</div>
  </div>
  <div class="lt" style="margin-bottom:4px;">Enter your access key to continue</div>
  <input id="ki" class="ui" type="password" placeholder="Access key" autofocus
         onkeydown="if(event.key==='Enter')go()">
  <button class="ub" onclick="go()">UNLOCK &rarr;</button>
  <a href="https://app.salesbeakon.com" style="display:block;text-align:center;margin-top:10px;color:#00d4c8;font-size:12px;text-decoration:none;">Sign in via Hub for one-click access &rarr;</a>
  <div id="ue" class="ue">Invalid key &mdash; please check and try again.</div>
</div>
</div>

const S=new TextEncoder().encode('beakon-security-v1');
async function dk(p){
  const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:S,iterations:10000,hash:'SHA-256'},
    k,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function dec(p){
  const key=await dk(p);
  const raw=Uint8Array.from(atob(E),c=>c.charCodeAt(0));
  const iv=raw.slice(0,12),ct=raw.slice(12);
  const d=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(d);
}
async function render(p){
  const h=await dec(p);
  // Rewrite the current document in-place so the URL stays as
  // https://<acct>.salesbeakon.com/ — refresh, bookmark, share-link all work.
  // (Earlier blob-URL approach broke F5/Ctrl+Shift+R with ERR_FILE_NOT_FOUND.)
  document.open('text/html');
  document.write(h);
  document.close();
}
function getCookieToken(){
  // Cookie 'beakon_tokens' is set by hub on login, scoped to .salesbeakon.com
  // Format: JSON map of {hostname: token}
  try{
    const m=document.cookie.split('; ').find(r=>r.startsWith('beakon_tokens='));
    if(!m)return null;
    const map=JSON.parse(decodeURIComponent(m.split('=').slice(1).join('=')));
    // Match by current hostname (e.g. neon.salesbeakon.com)
    return map[location.hostname]||null;
  }catch(e){return null;}
}
async function init(){
  console.log('[BEAKON] Auto-unlock init for', location.hostname);
  // 1. Try URL query param first (?t=TOKEN from hub click or bookmark)
  const p=new URLSearchParams(location.search).get('t');
  if(p){console.log('[BEAKON] Found ?t= in URL — attempting decrypt');try{await render(p);return;}catch(e){console.warn('[BEAKON] URL token decrypt failed:', e.message);}}
  // 2. Try cookie (set by hub login — auto-unlocks if user logged into hub)
  const ck=getCookieToken();
  if(ck){console.log('[BEAKON] Found token in cookie — attempting decrypt');try{await render(ck);return;}catch(e){console.warn('[BEAKON] Cookie token decrypt failed:', e.message);}}
  else{
    var has = document.cookie && document.cookie.indexOf('beakon_tokens=')>=0;
    if(has){console.log('[BEAKON] Cookie present but no token for this hostname (' + location.hostname + '). Hub ACCOUNTS map missing token? cookie:', document.cookie.substring(0,120)+'...');}
    else   {console.log('[BEAKON] No beakon_tokens cookie set. document.cookie =', document.cookie ? document.cookie.substring(0,80)+'...' : '(empty)');}
    console.log('[BEAKON] Tip: visit https://app.salesbeakon.com and log in to enable auto-unlock');
  }
  // 3. Fallback to manual unlock prompt
  document.getElementById('al').style.display='none';
  document.getElementById('ul').style.display='flex';
}
async function go(){
  const p=document.getElementById('ki').value.trim();
  if(!p)return;
  document.getElementById('ue').style.display='none';
  try{await render(p);}
  catch(e){document.getElementById('ue').style.display='block';}
}
init();
